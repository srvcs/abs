schemaVersion: 1
name: "srvcs-abs"
slug: "abs"
repository: "srvcs/abs"
package: "srvcs-abs"
function: "absolute value"
kind: "orchestrator"
categories:
  - "absolute-value"
dependencies:
  - slug: "isnegative"
    service: "srvcs-isnegative"
  - slug: "negate"
    service: "srvcs-negate"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "json"
    required: true
outputs:
  - name: "value"
    type: "json"
  - name: "result"
    type: "json"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_ISNEGATIVE_URL"
    default: "http://127.0.0.1:8084"
    purpose: "Base URL for srvcs-isnegative"
  - name: "SRVCS_NEGATE_URL"
    default: "http://127.0.0.1:8085"
    purpose: "Base URL for srvcs-negate"
